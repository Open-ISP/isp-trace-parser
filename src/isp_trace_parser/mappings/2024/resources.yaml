# 2024 ISP resources mapping
#
# Notes:
#   * Keys are trace filename stems (the part before `_RefYear<year>.csv`).
#   * `location` is the general location identifier, distinct from the
#     full trace stem: for projects it is the project name; for zones
#      it is the REZ code (e.g. `N6`).
#   * `location_type` is either "project" (power-station-level CSVs) or
#     "zone" (REZ-level CSVs), for the 2024 ISP.
#   * Project entries carry exactly one parent field:
#      - `zone` (REZ code) when the project sits inside a formal REZ, or
#      - `subregion` (e.g. SNSW) when it does not.
#   * Zone entries don't include any parent field (their parent is determined
#     via topography.yaml.
#   * Entries are grouped by type then technology, alphabetical within
#     each group: solar projects, wind projects, solar zones, wind zones.
#
# (See ADR-001 for further details and options considered.)

